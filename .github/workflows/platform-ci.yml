# CI for platform/ (Prisma + web + Python API).
# Use when the repository root contains platform/, cleanroom/, docs/, etc.
name: Platform CI

on:
  push:
    paths:
      - "platform/**"
      - ".github/workflows/platform-ci.yml"
  pull_request:
    paths:
      - "platform/**"
      - ".github/workflows/platform-ci.yml"

defaults:
  run:
    working-directory: platform

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nims
          POSTGRES_PASSWORD: nims_ci
          POSTGRES_DB: nims_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nims -d nims_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://nims:nims_ci@localhost:5432/nims_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            platform/package-lock.json
            platform/web/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"
          enable-cache: true

      - name: Install dependencies
        run: npm ci && npm ci --prefix web && uv sync --all-extras --project backend

      - name: Prisma generate
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: ESLint
        run: npm run lint

      - name: Ruff
        run: uv run ruff check nims
        working-directory: platform/backend

      - name: OpenAPI and JSON schema contract (no drift)
        run: |
          npm run api:export
          npm run codegen:web
          git diff --exit-code -- web/src/api/openapi.json web/src/api/generated-openapi.ts web/src/validation/pydantic-schemas
        working-directory: platform

      - name: Typecheck web
        run: npm run typecheck

      - name: Build web
        run: npm run web:build

      - name: Pytest
        run: uv run pytest -q
        working-directory: platform/backend
